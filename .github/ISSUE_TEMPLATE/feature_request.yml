name: Feature request
description: A new technique, file format, plot type, or improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have a clear use-case? That's what we need most.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the workflow you want to do but currently can't (or can't do easily).
        Concrete > abstract: "I want to fit a Voigt to my Raman peak from a .wdf file" beats
        "Praxis should support more file formats".
      placeholder: I work on photoluminescence and want to analyse time-resolved decays.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: A sketch of the API, command, or feature you have in mind.
      placeholder: |
        from praxis.techniques.photoluminescence import fit_decay
        fit_decay(time, intensity, model="biexponential")
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: What you're using today
      description: Workarounds, other tools, or scripts that you'd like to replace.

  - type: dropdown
    id: kind
    attributes:
      label: Category
      multiple: false
      options:
        - New technique module
        - New file format
        - New plot type or journal style
        - Loader improvement
        - Analysis improvement
        - Documentation
        - Other
    validations:
      required: true
