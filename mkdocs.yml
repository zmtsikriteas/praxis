site_name: Praxis
site_description: Scientific data analysis and publication-quality plotting for 50+ characterisation techniques.
site_url: https://zmtsikriteas.github.io/praxis/
site_author: Zois Tsikriteas
repo_url: https://github.com/zmtsikriteas/praxis
repo_name: zmtsikriteas/praxis
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  logo: banner.jpg
  favicon: banner.jpg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow

nav:
  - Home: index.md
  - Cookbook: cookbook.md
  - Workflows: workflows.md
  - Plot types: plot-types.md
  - Techniques: techniques.md
  - Journal styles: journal-styles.md
  - Colour palettes: colour-palettes.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zmtsikriteas/praxis
